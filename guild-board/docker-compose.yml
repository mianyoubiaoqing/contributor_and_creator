services:
  guild-board:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_MODE: ${NEXT_PUBLIC_APP_MODE:-local}
        NEXT_PUBLIC_GUILD_BOARD_PROJECT_KEY: ${NEXT_PUBLIC_GUILD_BOARD_PROJECT_KEY:-default-jam-project}
        NEXT_PUBLIC_GUILD_BOARD_SYNC_TOKEN: ${NEXT_PUBLIC_GUILD_BOARD_SYNC_TOKEN:-}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    image: guild-board:latest
    container_name: guild-board
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_APP_MODE: ${NEXT_PUBLIC_APP_MODE:-local}
      NEXT_PUBLIC_GUILD_BOARD_PROJECT_KEY: ${NEXT_PUBLIC_GUILD_BOARD_PROJECT_KEY:-default-jam-project}
      NEXT_PUBLIC_GUILD_BOARD_SYNC_TOKEN: ${NEXT_PUBLIC_GUILD_BOARD_SYNC_TOKEN:-}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      GUILD_BOARD_SYNC_TOKEN: ${GUILD_BOARD_SYNC_TOKEN:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
    ports:
      - "${GUILD_BOARD_PORT:-3000}:3000"
